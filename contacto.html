<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formulario de contacto de Federico Montoro para consultas sobre desarrollo y soluciones digitales."
    />
    <title>Enviar mensaje | Federico Montoro</title>
    <link rel="icon" type="image/x-icon" href="assets/branding/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="secondary-page contact-page">
    <script>
      document.body.classList.add("theme-images-loading");

      try {
        if (localStorage.getItem("theme") === "dark") {
          document.body.classList.add("dark-mode");
        }
      } catch (error) {
        // The page remains usable when browser storage is unavailable.
      }
    </script>

    <header class="site-header secondary-header">
      <a class="brand" href="index.html#inicio" aria-label="Volver al inicio">
        <img
          class="brand-logo theme-image"
          src="assets/branding/fm-navbar-light.png"
          data-light-src="assets/branding/fm-navbar-light.png"
          data-dark-src="assets/branding/fm-navbar-dark.png"
          alt=""
          width="168"
          height="160"
        />
        <span>fedemontoro.com.ar</span>
      </a>
      <nav class="main-nav" aria-label="Navegación secundaria">
        <a href="index.html#inicio">Inicio</a>
        <a href="index.html#contacto">Contacto</a>
        <button
          class="theme-toggle"
          type="button"
          aria-label="Activar modo oscuro"
          aria-pressed="false"
          title="Activar modo oscuro"
        >
          <svg class="theme-icon theme-icon-moon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" />
          </svg>
          <svg class="theme-icon theme-icon-sun" aria-hidden="true" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41" />
          </svg>
        </button>
      </nav>
    </header>

    <main class="secondary-main contact-main">
      <div class="section-shell contact-page-layout">
        <div class="secondary-page-heading reveal">
          <p class="eyebrow">Contacto</p>
          <h1>Enviar mensaje</h1>
          <p>Dejame tus datos y me contacto a la brevedad.</p>
          <a class="secondary-back" href="index.html#contacto">
            <span aria-hidden="true">←</span>
            Volver a contacto
          </a>
        </div>

        <section class="contact-form-card reveal" aria-labelledby="contact-form-title">
          <h2 id="contact-form-title">Datos de contacto</h2>
          <form class="contact-form" id="contact-form" novalidate>
            <label class="form-field">
              <span>Nombre</span>
              <input
                type="text"
                name="nombre"
                placeholder="Tu nombre"
                autocomplete="name"
                required
              />
            </label>

            <label class="form-field">
              <span>Teléfono</span>
              <input
                type="tel"
                name="telefono"
                placeholder="Tu teléfono"
                autocomplete="tel"
                required
              />
            </label>

            <label class="form-field">
              <span>Email</span>
              <input
                type="email"
                name="email"
                placeholder="tuemail@email.com"
                autocomplete="email"
                required
              />
            </label>

            <label class="form-field form-field-message">
              <span>Mensaje</span>
              <textarea
                name="mensaje"
                placeholder="Contame brevemente en qué puedo ayudarte"
                rows="6"
                required
              ></textarea>
            </label>

            <button class="btn primary contact-submit" type="submit">Enviar consulta</button>
            <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
          </form>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <p>Federico Montoro • Transformando ideas en soluciones útiles</p>
      <nav aria-label="Enlaces externos">
        <a href="https://github.com/Frederick1824" target="_blank" rel="noopener noreferrer">
          GitHub
        </a>
        <a
          href="https://www.linkedin.com/in/federico-montoro-447b86253/"
          target="_blank"
          rel="noopener noreferrer"
        >
          LinkedIn
        </a>
        <a href="documents/cv-federico-montoro.pdf" download>CV</a>
        <a href="index.html#lab">FreToKa</a>
        <a href="index.html#contacto">Contacto</a>
      </nav>
    </footer>

    <script src="script.js"></script>
    <script src="contacto.js"></script>
  </body>
</html>
