<form action="https://formsubmit.co/fede.montoro1824@gmail.com" class="contact-form" id="contact-form" method="POST" novalidate="">
<input name="_subject" type="hidden" value="Nueva consulta desde fedemontoro.com.ar"/>

<input autocomplete="name" data-i18n-placeholder="contact.form.placeholder.name" name="nombre" placeholder="Tu nombre" required="" type="text"/>
</label>
<label class="form-field">
<span>Teléfono</span>
<input autocomplete="tel" data-i18n-placeholder="contact.form.placeholder.phone" name="telefono" placeholder="Tu teléfono" required="" type="tel"/>
</label>
<label class="form-field">
<span data-i18n="index.email">Email</span>

</label>
<label class="form-field form-field-message">
<span data-i18n="contacto.mensaje">Mensaje</span>
<textarea data-i18n-placeholder="contact.form.placeholder.message" name="mensaje" placeholder="Contame brevemente en qué puedo ayudarte" required="" rows="6"></textarea>
</label>
<button class="btn primary contact-submit" data-i18n="contacto.enviar.consulta" type="submit">Enviar consulta</button>
